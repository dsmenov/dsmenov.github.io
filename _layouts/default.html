<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const theme = savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

  <header class="main-header no-print">
    <nav class="nav-container">
      <div class="logo">
        <a href="/">Dmytro Smenov</a>
      </div>
      <div class="nav-links">
        <a href="/" title="About">About</a>
        <a href="/cv" title="CV">CV</a>
        <a href="https://www.linkedin.com/in/dsmenov/" target="_blank" rel="noopener" aria-label="LinkedIn">
          <i class="bi bi-linkedin"></i>
        </a>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
          <i class="bi bi-moon-stars" id="theme-icon"></i>
        </button>
      </div>
    </nav>
  </header>

  <main class="content-wrapper">
    {{ content }}
  </main>

  <footer>
    <p>&copy; XXI century - Dmytro Smenov</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const links = document.querySelectorAll('a');
      links.forEach(link => {
        // Only open in a new tab if it is an external link
        if (link.hostname && link.hostname !== window.location.hostname) {
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }
      });

      // Theme toggle logic
      const themeToggle = document.getElementById('theme-toggle');
      const themeIcon = document.getElementById('theme-icon');
      
      function updateIcon(theme) {
        if (theme === 'dark') {
          themeIcon.className = 'bi bi-sun';
        } else {
          themeIcon.className = 'bi bi-moon-stars';
        }
      }

      // Sync button icon with initial theme
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
      updateIcon(currentTheme);

      themeToggle.addEventListener('click', function () {
        const activeTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = activeTheme === 'dark' ? 'light' : 'dark';
        
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateIcon(newTheme);
      });
    });
  </script>
</body>

</html>
